name: Build & Deploy (staging)

on:
  workflow_dispatch:
  push:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: example-staging
  ECS_CLUSTER: example-staging
  ECS_SERVICE: staging-example
  CONTAINER_NAME: example

  FRONTEND_ECR_REPOSITORY: example-staging-frontend
  FRONTEND_ECS_SERVICE: staging-example-frontend
  FRONTEND_CONTAINER_NAME: example-frontend


jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List build context
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in build context:"
          find . -maxdepth 2 -not -path './.git/*' | head -80
          echo "---"
          echo "Dockerfile content:"
          cat Dockerfile
          echo "---"
          if [ -f .dockerignore ]; then echo ".dockerignore:"; cat .dockerignore; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create image tag
        id: image-tag
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── Backend ──────────────────────────────────────────────────────────

      - name: Build and push backend image
        env:
          IMAGE: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, steps.image-tag.outputs.tag) }}
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition tsk-staging-example \
            --query taskDefinition > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, steps.image-tag.outputs.tag) }}

      - name: Deploy backend to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10


      # ── Frontend ─────────────────────────────────────────────────────────

      - name: Build and push frontend image
        env:
          IMAGE: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.FRONTEND_ECR_REPOSITORY, steps.image-tag.outputs.tag) }}
        run: |
          docker build -t $IMAGE -f Dockerfile.frontend .
          docker push $IMAGE
          docker tag $IMAGE ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest

      - name: Download frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition tsk-staging-example-frontend \
            --query taskDefinition > frontend-task-definition.json

      - name: Update frontend task definition with new image
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition.json
          container-name: ${{ env.FRONTEND_CONTAINER_NAME }}
          image: ${{ format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.FRONTEND_ECR_REPOSITORY, steps.image-tag.outputs.tag) }}

      - name: Deploy frontend to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ env.FRONTEND_ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

